[mgr]
show_hidden = true
ratio = [1, 2, 3]

[[plugin.prepend_previewers]]
url = "*/"
run = 'piper -- eza  -a -TL=1 --color=always --icons=always --group-directories-first --no-quotes "$1"'
[[plugin.prepend_previewers]]
url = "*.tar*"
run = 'piper --format=url -- tar tf "$1"'
[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'
